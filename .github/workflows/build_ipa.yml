name: Build and Publish iOS IPA

on:
  push:
    tags:
      - 'v*' # 🚀 触发条件：推送 v 开头的 tag（如 v1.0.0）
  workflow_dispatch: # 手动触发开关

permissions:
  contents: write # 创建 Release 和上传必备权限

jobs:
  build-ios:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # 🌟 优化 1：升级至 @v4，利用 Node 20 和 zstd 算法，Pods 巨型目录解压速度起飞！
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods/repos
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # 🔪 优化 2：根据老哥的顶级理解，彻底手起刀落斩掉 pod repo update，走纯净 CDN，告别 429 熔断！

      # 🌟 优化 3：自动递增 Build Number 注入
      - name: Build iOS App (No Codesign)
        run: |
          # 核心魔法：--build-number=${{ github.run_number }}
          # 这样每次打包，APP 的内部版本号(build)就会自动变成 1, 2, 3... 永远不冲突！
          flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      - name: Make IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Orbix.ipa Payload

      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orbix-IPA
          path: Orbix.ipa
          retention-days: 5

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Orbix.ipa
          generate_release_notes: true
          name: Release ${{ github.ref_name }}