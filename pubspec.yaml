name: flutter_application_1
description: A new Flutter project.
publish_to: 'none'
version: 1.1.6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ 核心修复：升级 intl 版本以匹配你的 Flutter SDK
  intl: ^0.20.2

  # 本地化支持
  flutter_localizations:
    sdk: flutter
  html: ^0.15.4
  webview_flutter: ^4.4.2

  # UI 图标
  cupertino_icons: ^1.0.2

  # 网络与存储
  dio: ^5.3.0
  shared_preferences: ^2.2.0
  shimmer: ^3.0.0
  http: ^1.1.0  # 🌟 新增：HTTP 请求库

  # 🌟 为巨魔内购更新方案新增的插件
  path_provider: ^2.1.2
  share_plus: ^7.2.1

  # 功能组件
  fluttertoast: ^8.2.2
  google_fonts: ^6.1.0
  fl_chart: ^0.63.0
  flutter_slidable: ^3.0.0
  cached_network_image: ^3.2.3
  file_picker: ^5.3.0
  sentry_flutter: ^8.0.0
  flutter_local_notifications: ^18.0.0
  quick_actions: ^1.0.7
  url_launcher: ^6.3.2
  package_info_plus: ^8.0.0

  # 🌟 替换为以下正确的 media_kit 依赖
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  screen_brightness: ^2.1.8



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  # 图标生成工具
  flutter_launcher_icons: "^0.13.1"

# 图标生成配置 (顶格写)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
